<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    font-family: Arial;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    
   
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    margin-bottom: 1.5%;
}

.message {
    max-width: 60%;
    padding: 12px;
    margin: 10px;
    border-radius: 12px;
    line-height: 1.5;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #1e293b;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #020617;
    border-top: 1px solid #1e293b;
    margin-bottom: 1.5%;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<div id="welcome" style="text-align:center; margin-top:120px; opacity:0.9;">
    <h1 style="font-size:48px; margin-bottom:10px;">
         AI PDF Chat
    </h1>

    <p style="font-size:20px; color:#94a3b8;">
        Upload your PDFs and ask anything instantly
    </p>

    <p style="font-size:16px; color:#64748b; margin-top:20px;">
        Supports multiple PDFs • Smart answers • Fast ⚡
    </p>
</div>
    <div class="chat" id="chat"></div>
<button onclick="startListening()">🎤</button>
    <div style="padding:10px;">
        <input type="file" id="file" multiple>
        <button onclick="upload()">Upload</button>
    </div>

    <div class="input-area">
        <input id="q" placeholder="Ask something about your PDF...">
        <button onclick="ask()">Send</button>
    </div>

</div>

<script>
async function upload() {
    const files = document.getElementById("file").files;

    if (files.length === 0) {
        alert("Select files first");
        return;
    }

    const chat = document.getElementById("chat");
    const loadingMsg = addMessage("Uploading & processing PDFs...", "bot");

    for (let file of files) {
        const formData = new FormData();
        formData.append("file", file);

        await fetch("https://ai-doc-chat-4chx.onrender.com/upload", {
            method: "POST",
            body: formData
        });
    }

    loadingMsg.textContent = "PDFs ready! Ask anything now.";
}



async function ask() {
    const q = document.getElementById("q").value;

    if (!q) return;

    addMessage(q, "user");

    const botMsg = addMessage("Thinking...", "bot");

    const res = await fetch(`https://ai-doc-chat-4chx.onrender.com/ask?q=${q}`, {
        method: "POST"
    });

    const data = await res.json();

    botMsg.textContent = data.answer;

    speak(data.answer); // ✅ voice works clean

    document.getElementById("q").value = "";
}


function addMessage(text, type) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.style.display = "none"; // 👈 hide when chat starts

    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.textContent = text;

    document.getElementById("chat").appendChild(msg);
    document.getElementById("chat").scrollTop = 999999;

    return msg;
}

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.rate = 1;
    speech.pitch = 1;

    window.speechSynthesis.speak(speech);
}



function startListening() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.onresult = function(event) {
        document.getElementById("q").value = event.results[0][0].transcript;
    };

    recognition.start();
}


</script>

</body>
</html>
